server:
  port: 8080

spring:
  datasource:
    url: ${AGENT_PLATFORM_DB_URL:jdbc:postgresql://localhost:15432/agent_platform}
    username: ${AGENT_PLATFORM_DB_USERNAME:agent}
    password: ${AGENT_PLATFORM_DB_PASSWORD:agent123}

web:
  gateway:
    internal-base-url: ${AGENT_PLATFORM_GATEWAY_URL:http://localhost:8081}
    internal-token: ${AGENT_PLATFORM_GATEWAY_INTERNAL_TOKEN:dev-internal-token}

security:
  jwt:
    secret: ${AGENT_PLATFORM_JWT_SECRET:dev-only-change-me-dev-only-change-me}
    expires-in-seconds: ${AGENT_PLATFORM_JWT_EXPIRES_IN_SECONDS:7200}

agent:
  rag:
    vector-store: qdrant
    embedding-provider: openai-compatible
    embedding:
      enabled: true
      base-url: https://api.siliconflow.cn/v1
      api-key: ${SILICONFLOW_API_KEY:}
      model: BAAI/bge-large-zh-v1.5
      dimension: 0
    qdrant:
      enabled: true
      base-url: http://localhost:6333
      collection-name: rag_chunks_bge_1024
      dimension: 1024
    reranker:
      enabled: true
      provider: openai-compatible
      base-url: https://api.siliconflow.cn/v1
      api-key: ${SILICONFLOW_API_KEY:}
      model: BAAI/bge-reranker-v2-m3
      path: /rerank
      timeout-ms: 5000
    semantic-cache:
      enabled: true
      provider: memory
      similarity-threshold: 0.9
      ttl-ms: 60000
      max-entries: 256
