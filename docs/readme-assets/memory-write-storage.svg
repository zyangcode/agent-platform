<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">记忆系统 - 写入存储流程</title>
  <desc id="desc">展示长期记忆候选生成、准入、脱敏、去重冲突、PostgreSQL 事实源和派生索引写入。</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/></marker><marker id="g" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/></marker><style>.bg{fill:#0d1117}.panel{fill:#161b22;stroke:#30363d}.title{font:700 24px "Microsoft YaHei","Segoe UI",sans-serif;fill:#e6edf3}.lane{font:700 12px "Microsoft YaHei","Segoe UI",sans-serif}.t{font:700 12px "Microsoft YaHei","Segoe UI",sans-serif;fill:#f8fafc}.s{font:10px "Microsoft YaHei","Segoe UI",sans-serif;fill:#94a3b8}.box{rx:8;stroke-width:1.3}.in{fill:#2a1905;stroke:#f59e0b}.ok{fill:#052e16;stroke:#22c55e}.warn{fill:#3a2605;stroke:#f59e0b}.off{fill:#241142;stroke:#a78bfa;stroke-dasharray:5 5}.store{fill:#111827;stroke:#64748b}.edge{fill:none;stroke:#38bdf8;stroke-width:2;marker-end:url(#a)}.good{fill:none;stroke:#22c55e;stroke-width:2;marker-end:url(#g)}.dash{fill:none;stroke:#a78bfa;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#a)}</style></defs>
  <rect class="bg" width="1500" height="900"/><text class="title" x="750" y="38" text-anchor="middle">记忆系统 - 写入存储流程</text>
  <rect class="panel" x="50" y="70" width="1400" height="150" rx="10"/><text class="lane" x="70" y="94" fill="#f59e0b">写入触发与候选生成</text>
  <rect class="box in" x="80" y="118" width="180" height="58"/><text class="t" x="170" y="141" text-anchor="middle">对话结束</text><text class="s" x="170" y="158" text-anchor="middle">summary / reflection</text>
  <rect class="box in" x="315" y="118" width="180" height="58"/><text class="t" x="405" y="141" text-anchor="middle">用户显式控制</text><text class="s" x="405" y="158" text-anchor="middle">记住 / 忘记 / 不要记</text>
  <rect class="box in" x="550" y="118" width="190" height="58"/><text class="t" x="645" y="141" text-anchor="middle">工具事件</text><text class="s" x="645" y="158" text-anchor="middle">tool_failure / reflection</text>
  <rect class="box ok" x="820" y="108" width="230" height="78"/><text class="t" x="935" y="135" text-anchor="middle">MemoryWriteCandidate</text><text class="s" x="935" y="153" text-anchor="middle">preference / fact / summary</text><text class="s" x="935" y="169" text-anchor="middle">reflection / tool_failure</text>
  <rect class="box off" x="1130" y="108" width="240" height="78"/><text class="t" x="1250" y="135" text-anchor="middle">策略门禁</text><text class="s" x="1250" y="153" text-anchor="middle">READ_WRITE 才允许自动写入</text><text class="s" x="1250" y="169" text-anchor="middle">READ_ONLY / DISABLED 阻断</text>
  <path class="edge" d="M260 147 H315"/><path class="edge" d="M495 147 H550"/><path class="edge" d="M740 147 H820"/><path class="edge" d="M1050 147 H1130"/>

  <rect class="panel" x="210" y="270" width="1080" height="210" rx="10"/><text class="lane" x="230" y="294" fill="#22c55e">准入、隐私与冲突处理</text>
  <rect class="box ok" x="260" y="330" width="190" height="62"/><text class="t" x="355" y="354" text-anchor="middle">敏感扫描</text><text class="s" x="355" y="372" text-anchor="middle">敏感内容不入长期记忆</text>
  <rect class="box ok" x="510" y="330" width="190" height="62"/><text class="t" x="605" y="354" text-anchor="middle">写入准入</text><text class="s" x="605" y="372" text-anchor="middle">高置信 fact / preference</text>
  <rect class="box warn" x="760" y="330" width="210" height="62"/><text class="t" x="865" y="354" text-anchor="middle">去重与冲突处理</text><text class="s" x="865" y="372" text-anchor="middle">相似检索 / supersede</text>
  <rect class="box ok" x="1030" y="330" width="210" height="62"/><text class="t" x="1135" y="354" text-anchor="middle">MemoryManagementService</text><text class="s" x="1135" y="372" text-anchor="middle">统一落库入口</text>
  <path class="good" d="M450 361 H510"/><path class="good" d="M700 361 H760"/><path class="good" d="M970 361 H1030"/>
  <path class="edge" d="M1250 186 V245 H355 V330"/>

  <rect class="panel" x="90" y="535" width="1320" height="155" rx="10"/><text class="lane" x="110" y="560" fill="#94a3b8">事实源与派生索引</text>
  <path class="store" d="M135 610 C135 590,395 590,395 610 L395 655 C395 675,135 675,135 655 Z"/><ellipse class="store" cx="265" cy="610" rx="130" ry="18"/><text class="t" x="265" y="632" text-anchor="middle">PostgreSQL memories</text><text class="s" x="265" y="650" text-anchor="middle">唯一业务事实源</text>
  <rect class="box ok" x="470" y="600" width="230" height="62"/><text class="t" x="585" y="624" text-anchor="middle">Qdrant 向量索引</text><text class="s" x="585" y="642" text-anchor="middle">source_type=memory</text>
  <rect class="box ok" x="770" y="600" width="230" height="62"/><text class="t" x="885" y="624" text-anchor="middle">PG tsvector</text><text class="s" x="885" y="642" text-anchor="middle">GIN 倒排检索</text>
  <rect class="box off" x="1070" y="600" width="230" height="62"/><text class="t" x="1185" y="624" text-anchor="middle">Neo4j 图谱</text><text class="s" x="1185" y="642" text-anchor="middle">后续增强，当前未实现</text>
  <path class="good" d="M1135 392 V515 H265 V590"/><path class="good" d="M395 632 H470"/><path class="good" d="M700 632 H770"/><path class="dash" d="M1000 632 H1070"/>

  <rect class="panel" x="210" y="735" width="1080" height="105" rx="10"/><text class="lane" x="230" y="760" fill="#eab308">Consolidation 与生命周期</text>
  <rect class="box warn" x="260" y="785" width="220" height="40"/><text class="s" x="370" y="809" text-anchor="middle">30 天 stale 后 importance * 0.85</text>
  <rect class="box warn" x="535" y="785" width="220" height="40"/><text class="s" x="645" y="809" text-anchor="middle">重复内容 / 标签合并</text>
  <rect class="box warn" x="810" y="785" width="240" height="40"/><text class="s" x="930" y="809" text-anchor="middle">expires_at 过期归档并清理索引</text>
  <path class="edge" d="M480 805 H535"/><path class="edge" d="M755 805 H810"/>
</svg>
