<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nexus UI Effects</title>
  <style>
    :root {
      --bg0: #0a0a1a;
      --bg1: #0f0f2e;
      --panel: rgba(17, 24, 55, 0.58);
      --panel-strong: rgba(18, 26, 62, 0.76);
      --panel-soft: rgba(255, 255, 255, 0.055);
      --line: rgba(148, 163, 184, 0.18);
      --line-strong: rgba(96, 165, 250, 0.34);
      --text: #eef5ff;
      --muted: #92a4c7;
      --faint: #64748b;
      --blue: #3b82f6;
      --cyan: #38bdf8;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #fb7185;
      --violet: #8b5cf6;
      --radius: 8px;
      font-family: "Fira Sans", "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      overflow: hidden;
      background:
        radial-gradient(circle at 4% 8%, rgba(59, 130, 246, 0.2), transparent 25%),
        radial-gradient(circle at 92% 18%, rgba(34, 197, 94, 0.1), transparent 22%),
        radial-gradient(circle at 76% 92%, rgba(56, 189, 248, 0.14), transparent 26%),
        linear-gradient(135deg, var(--bg0), var(--bg1) 58%, #09091d);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.016) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, transparent, #000 12%, #000 88%, transparent);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(115deg, transparent 0%, rgba(255, 255, 255, 0.035) 45%, transparent 54%),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.018), rgba(255, 255, 255, 0.018) 1px, transparent 1px, transparent 4px);
      mix-blend-mode: screen;
      opacity: 0.38;
    }

    .canvas {
      position: relative;
      width: 1440px;
      height: 900px;
      padding: 26px;
      overflow: hidden;
    }

    .flow-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.55;
      filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.35));
    }

    .shell {
      position: relative;
      height: 100%;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.42), rgba(15, 23, 42, 0.18));
      box-shadow: 0 30px 120px rgba(0, 0, 0, 0.44), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(28px);
      overflow: hidden;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(59, 130, 246, 0.08), transparent 25%, rgba(56, 189, 248, 0.05) 78%, transparent);
    }

    .topbar {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 220px 1fr 260px;
      align-items: center;
      height: 62px;
      padding: 0 22px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.14);
      background: linear-gradient(90deg, rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.28));
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .mark {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background:
        linear-gradient(135deg, rgba(59, 130, 246, 0.95), rgba(34, 197, 94, 0.75)),
        linear-gradient(#fff, #fff);
      box-shadow: 0 0 24px rgba(59, 130, 246, 0.36);
    }

    .search {
      justify-self: start;
      width: 360px;
      height: 34px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.045);
    }

    .userbar {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.7), rgba(15, 23, 42, 0.8));
    }

    .content {
      position: relative;
      z-index: 2;
      height: calc(100% - 62px);
      padding: 22px;
    }

    .glass {
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: var(--radius);
      background: linear-gradient(145deg, var(--panel), rgba(255, 255, 255, 0.04));
      backdrop-filter: blur(22px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 18px 54px rgba(0, 0, 0, 0.28);
    }

    .soft-panel {
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.04);
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      margin: 4px 2px 18px;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0;
      font-weight: 760;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .btn {
      height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 0 14px;
      border: 1px solid rgba(96, 165, 250, 0.28);
      border-radius: 8px;
      color: #eaf4ff;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.72), rgba(56, 189, 248, 0.28));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.13), 0 0 28px rgba(59, 130, 246, 0.18);
      font-size: 13px;
      font-weight: 650;
    }

    .btn.secondary {
      background: rgba(255, 255, 255, 0.045);
      border-color: rgba(148, 163, 184, 0.18);
      color: var(--muted);
      box-shadow: none;
    }

    .icon {
      width: 16px;
      height: 16px;
      display: inline-block;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      color: #cbd5e1;
      background: rgba(255, 255, 255, 0.055);
      font-size: 11px;
      font-family: "Fira Code", Consolas, monospace;
    }

    .tag.blue { color: #bfdbfe; border-color: rgba(96, 165, 250, 0.32); background: rgba(59, 130, 246, 0.12); }
    .tag.green { color: #bbf7d0; border-color: rgba(34, 197, 94, 0.32); background: rgba(34, 197, 94, 0.1); }
    .tag.amber { color: #fde68a; border-color: rgba(245, 158, 11, 0.32); background: rgba(245, 158, 11, 0.1); }
    .tag.red { color: #fecdd3; border-color: rgba(251, 113, 133, 0.32); background: rgba(251, 113, 133, 0.1); }

    .metric {
      padding: 18px;
      min-height: 104px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0;
    }

    .value {
      margin-top: 10px;
      font-size: 28px;
      font-weight: 760;
      font-family: "Fira Code", Consolas, monospace;
      letter-spacing: 0;
    }

    .small {
      color: var(--faint);
      font-size: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      height: 38px;
      text-align: left;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid rgba(148, 163, 184, 0.14);
    }

    td {
      height: 50px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.095);
      color: #dbeafe;
    }

    .mono { font-family: "Fira Code", Consolas, monospace; }

    .chat-layout {
      display: grid;
      grid-template-columns: 260px 1fr 360px;
      gap: 14px;
      height: 100%;
    }

    .history {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-item {
      padding: 11px 10px;
      border-radius: 8px;
      color: #cbd5e1;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(148, 163, 184, 0.1);
      font-size: 13px;
    }

    .history-item.active {
      color: #eff6ff;
      border-color: rgba(96, 165, 250, 0.28);
      background: linear-gradient(90deg, rgba(59, 130, 246, 0.18), rgba(255, 255, 255, 0.04));
    }

    .chat-main {
      display: grid;
      grid-template-rows: 44px 1fr 150px;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    }

    .select-pill {
      height: 28px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border-radius: 7px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      background: rgba(255, 255, 255, 0.045);
      color: #dbeafe;
      font-size: 12px;
    }

    .messages {
      padding: 26px 30px 12px;
      overflow: hidden;
    }

    .bubble {
      max-width: 620px;
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 14px;
      line-height: 1.55;
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .bubble.user {
      margin-left: auto;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.28), rgba(56, 189, 248, 0.08));
      border-color: rgba(96, 165, 250, 0.26);
    }

    .bubble.assistant {
      background: rgba(255, 255, 255, 0.055);
    }

    .tool-card {
      width: 570px;
      padding: 12px 14px;
      border-radius: 8px;
      color: #dbeafe;
      background: linear-gradient(90deg, rgba(56, 189, 248, 0.11), rgba(34, 197, 94, 0.06));
      border: 1px solid rgba(56, 189, 248, 0.2);
      font-size: 12px;
      font-family: "Fira Code", Consolas, monospace;
    }

    .composer {
      margin: 0 20px 18px;
      padding: 14px;
      border-color: rgba(96, 165, 250, 0.3);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(59, 130, 246, 0.06));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 0 44px rgba(59, 130, 246, 0.14);
    }

    .composer .input {
      height: 72px;
      color: #cbd5e1;
      font-size: 15px;
      padding: 2px 4px;
    }

    .composer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(148, 163, 184, 0.12);
      padding-top: 12px;
    }

    .runtime {
      padding: 16px;
      overflow: hidden;
    }

    .runtime h3 {
      font-size: 15px;
      margin-bottom: 14px;
    }

    .timeline-dot {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      gap: 9px;
      align-items: center;
      margin: 13px 0;
      font-size: 12px;
      color: #cbd5e1;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 14px rgba(56, 189, 248, 0.7);
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .profile-card {
      min-height: 190px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .profile-title {
      font-size: 17px;
      font-weight: 720;
      margin-bottom: 12px;
    }

    .card-tags {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .filter {
      height: 36px;
      min-width: 180px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      color: var(--muted);
      border: 1px solid rgba(148, 163, 184, 0.13);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      font-size: 13px;
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
    }

    .tab {
      height: 34px;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      border-radius: 8px;
      color: var(--muted);
      border: 1px solid rgba(148, 163, 184, 0.12);
      background: rgba(255, 255, 255, 0.035);
      font-size: 13px;
    }

    .tab.active {
      color: #eff6ff;
      border-color: rgba(96, 165, 250, 0.32);
      background: rgba(59, 130, 246, 0.16);
    }

    .table-panel {
      padding: 0 18px 14px;
      overflow: hidden;
    }

    .pager {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 13px;
      color: var(--muted);
      font-size: 12px;
      font-family: "Fira Code", Consolas, monospace;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 14px;
    }

    .chart-panel {
      height: 238px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .chart {
      height: 166px;
      display: flex;
      align-items: end;
      gap: 18px;
      padding: 20px 18px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      background: linear-gradient(180deg, rgba(59, 130, 246, 0.06), transparent);
    }

    .bar {
      flex: 1;
      min-width: 42px;
      border-radius: 7px 7px 0 0;
      background: linear-gradient(180deg, rgba(56, 189, 248, 0.8), rgba(59, 130, 246, 0.18));
      box-shadow: 0 0 22px rgba(56, 189, 248, 0.18);
    }

    .trace-info {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .span-list {
      padding: 16px 18px 18px;
    }

    .span-row {
      display: grid;
      grid-template-columns: 230px 1fr 70px;
      align-items: center;
      height: 58px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      font-size: 13px;
    }

    .span-track {
      position: relative;
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      overflow: hidden;
    }

    .span-fill {
      position: absolute;
      left: var(--left);
      width: var(--width);
      top: 0;
      bottom: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(56, 189, 248, 0.78), rgba(34, 197, 94, 0.7));
      box-shadow: 0 0 18px rgba(56, 189, 248, 0.3);
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .app-card {
      min-height: 156px;
      padding: 18px;
    }

    .keyline {
      margin: 16px 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.13);
      background: rgba(2, 6, 23, 0.34);
      font-family: "Fira Code", Consolas, monospace;
      color: #bfdbfe;
    }

    .admin-layout {
      display: grid;
      grid-template-columns: 230px 1fr;
      gap: 14px;
      height: calc(100% - 72px);
    }

    .admin-nav {
      padding: 12px;
    }

    .nav-item {
      height: 38px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 11px;
      margin-bottom: 7px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .nav-item.active {
      color: #eff6ff;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(96, 165, 250, 0.26);
    }

    .login-wrap {
      height: 100%;
      display: grid;
      place-items: center;
    }

    .login-card {
      width: 440px;
      padding: 34px;
      text-align: center;
      border-color: rgba(96, 165, 250, 0.28);
      box-shadow: 0 32px 110px rgba(0, 0, 0, 0.46), 0 0 70px rgba(59, 130, 246, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .login-card .mark {
      margin: 0 auto 16px;
      width: 44px;
      height: 44px;
      border-radius: 11px;
    }

    .login-card h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .login-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin: 28px 0 20px;
      padding: 5px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .login-tab {
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .login-tab.active {
      color: #eff6ff;
      background: rgba(59, 130, 246, 0.2);
    }

    .field {
      text-align: left;
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: #cbd5e1;
      font-size: 12px;
    }

    .field-input {
      height: 42px;
      width: 100%;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      background: rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>
  <div class="canvas">
    <svg class="flow-lines" viewBox="0 0 1440 900" fill="none">
      <path d="M-40 178 C 248 95, 350 302, 642 212 S 1050 30, 1500 160" stroke="rgba(56,189,248,.42)" stroke-width="1.2"/>
      <path d="M80 842 C 310 670, 468 840, 702 690 S 1040 614, 1390 742" stroke="rgba(59,130,246,.32)" stroke-width="1"/>
      <path d="M1220 -40 C 1026 120, 1190 280, 936 416 S 630 452, 482 622" stroke="rgba(34,197,94,.22)" stroke-width="1"/>
    </svg>
    <div id="app" class="shell"></div>
  </div>

  <script>
    const page = new URLSearchParams(location.search).get("page") || "chat";

    const icon = (name) => {
      const paths = {
        plus: '<path d="M12 5v14M5 12h14"/>',
        send: '<path d="m22 2-7 20-4-9-9-4 20-7Z"/><path d="M22 2 11 13"/>',
        copy: '<rect x="9" y="9" width="13" height="13" rx="2"/><rect x="2" y="2" width="13" height="13" rx="2"/>',
        key: '<path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.78 7.78 5.5 5.5 0 0 1 7.78-7.78Zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3"/>',
        shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>',
        chart: '<path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-7"/>',
        trace: '<path d="M4 7h7"/><path d="M4 17h7"/><path d="M13 7h7"/><path d="M13 17h7"/><path d="M11 7c2 0 2 10 4 10"/>',
        table: '<path d="M3 5h18M3 12h18M3 19h18"/><path d="M8 5v14M16 5v14"/>',
        user: '<path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/>'
      };
      return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${paths[name] || paths.plus}</svg>`;
    };

    const topbar = (search = "搜索 Trace、Profile、Application") => `
      <div class="topbar">
        <div class="brand"><span class="mark"></span><span>Nexus</span></div>
        <div class="search">${search}</div>
        <div class="userbar"><span>Admin Workspace</span><span class="avatar"></span></div>
      </div>`;

    const shell = (content, search) => `${topbar(search)}<main class="content">${content}</main>`;

    const pageHead = (title, sub, button) => `
      <div class="page-head">
        <div><h1>${title}</h1><p class="subtitle">${sub}</p></div>
        ${button || ""}
      </div>`;

    const rows = [
      ["calculator", "calculator", "算术表达式求值工具", "BUILTIN", "ENABLED"],
      ["weather", "weather", "城市天气查询", "CUSTOM", "ENABLED"],
      ["rag-search", "rag_search", "知识库向量检索", "MCP", "ENABLED"],
      ["deploy-guard", "deploy_guard", "高危发布二次确认", "JAR", "DISABLED"],
      ["profile-memory", "profile_memory", "长期记忆写入策略", "CONFIG", "ENABLED"]
    ];

    const tableRows = rows.map((r, i) => `
      <tr>
        <td>${r[0]}</td><td class="mono">${r[1]}</td><td>${r[2]}</td>
        <td><span class="tag blue">${r[3]}</span></td>
        <td><span class="tag ${r[4] === "ENABLED" ? "green" : "amber"}">${r[4]}</span></td>
        <td class="small">查看&nbsp;&nbsp;${r[4] === "ENABLED" ? "禁用" : "启用"}</td>
      </tr>`).join("");

    const templates = {
      chat: () => shell(`
        <div class="chat-layout">
          <aside class="history glass">
            <button class="btn">${icon("plus")}新建对话</button>
