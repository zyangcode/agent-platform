name: Retrieval Evaluation

on:
  pull_request:
    paths:
      - "agent-platform-core/src/main/java/com/ls/agent/core/memory/**"
      - "agent-platform-core/src/main/java/com/ls/agent/core/rag/**"
      - "agent-platform-core/src/main/java/com/ls/agent/core/context/**"
      - "agent-platform-core/src/main/java/com/ls/agent/core/evaluation/**"
      - "agent-platform-core/src/test/java/com/ls/agent/core/memory/**"
      - "agent-platform-core/src/test/java/com/ls/agent/core/rag/**"
      - "agent-platform-core/src/test/java/com/ls/agent/core/evaluation/**"
      - "实际开发/优化阶段/记忆系统优化/retrieval-eval-*.jsonl"
      - "scripts/run-retrieval-eval.ps1"
  push:
    branches:
      - "feature/memory-rag-optimization"
    paths:
      - "agent-platform-core/src/main/java/com/ls/agent/core/memory/**"
      - "agent-platform-core/src/main/java/com/ls/agent/core/rag/**"
      - "agent-platform-core/src/main/java/com/ls/agent/core/context/**"
      - "agent-platform-core/src/main/java/com/ls/agent/core/evaluation/**"
      - "agent-platform-core/src/test/java/com/ls/agent/core/memory/**"
      - "agent-platform-core/src/test/java/com/ls/agent/core/rag/**"
      - "agent-platform-core/src/test/java/com/ls/agent/core/evaluation/**"
      - "实际开发/优化阶段/记忆系统优化/retrieval-eval-*.jsonl"
      - "scripts/run-retrieval-eval.ps1"

jobs:
  retrieval-eval:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"
      - name: Run retrieval evaluation gate
        shell: pwsh
        run: ./scripts/run-retrieval-eval.ps1
