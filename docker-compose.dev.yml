services:
  postgres:
    image: postgres:16
    container_name: agent-platform-dev-postgres
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent123
    ports:
      - "15432:5432"
    volumes:
      - agent-platform-dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_platform"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  agent-platform-dev-postgres-data:
