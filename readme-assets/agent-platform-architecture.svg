<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="950" viewBox="0 0 1200 950" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent 平台系统架构图</title>
  <desc id="desc">展示浏览器、开发者代码、Web、Gateway、Core Agent Runtime 与 PostgreSQL、Qdrant、LLM APIs 的调用关系。</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#58a6ff" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3fb950" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#a371f7" />
    </marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e3b341" />
    </marker>
    <style>
      .bg { fill: #0d1117; }
      .layer { fill: #161b22; stroke: #30363d; stroke-width: 1.2; opacity: 0.78; }
      .label { font: 700 11px "Microsoft YaHei", "Noto Sans CJK SC", "Segoe UI", sans-serif; }
      .title { font: 700 24px "Microsoft YaHei", "Noto Sans CJK SC", "Segoe UI", sans-serif; fill: #e6edf3; }
      .box-title { font: 700 13px "Microsoft YaHei", "Noto Sans CJK SC", "Segoe UI", sans-serif; fill: #c9d1d9; }
      .box-sub { font: 10px "Microsoft YaHei", "Noto Sans CJK SC", "Segoe UI", sans-serif; fill: #8b949e; }
      .small { font: 10px "Microsoft YaHei", "Noto Sans CJK SC", "Segoe UI", sans-serif; fill: #8b949e; }
      .entry { fill: #0d2137; stroke: #1f6feb; }
      .channel { fill: #0d2818; stroke: #238636; }
      .core { fill: #1a1038; stroke: #8b5cf6; }
      .infra { fill: #3d2a10; stroke: #d29922; }
      .edge-blue { fill: none; stroke: #58a6ff; stroke-width: 1.8; marker-end: url(#arrow-blue); }
      .edge-green { fill: none; stroke: #3fb950; stroke-width: 1.8; marker-end: url(#arrow-green); }
      .edge-purple { fill: none; stroke: #a371f7; stroke-width: 1.8; marker-end: url(#arrow-purple); }
      .edge-gold { fill: none; stroke: #e3b341; stroke-width: 1.8; marker-end: url(#arrow-gold); }
      .edge-dashed { fill: none; stroke: #f85149; stroke-width: 1.8; stroke-dasharray: 6 6; marker-end: url(#arrow-purple); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="950" />
  <text class="title" x="600" y="38" text-anchor="middle">AI Agent 平台 - 系统架构图</text>

  <rect class="layer" x="40" y="60" width="1120" height="130" rx="8" />
  <text class="label" x="55" y="80" fill="#58a6ff">入口层</text>
  <rect class="entry" x="180" y="90" width="220" height="65" rx="8" />
  <text class="box-title" x="290" y="119" text-anchor="middle">浏览器</text>
  <text class="box-sub" x="290" y="139" text-anchor="middle">React SPA</text>
  <rect class="entry" x="780" y="90" width="240" height="65" rx="8" />
  <text class="box-title" x="900" y="119" text-anchor="middle">开发者代码</text>
  <text class="box-sub" x="900" y="139" text-anchor="middle">API Key / OpenAI SDK</text>

  <rect class="layer" x="40" y="220" width="1120" height="170" rx="8" />
  <text class="label" x="55" y="240" fill="#3fb950">通道层</text>
  <rect class="channel" x="180" y="255" width="220" height="65" rx="8" />
  <text class="box-title" x="290" y="284" text-anchor="middle">Web (:8080)</text>
  <text class="box-sub" x="290" y="304" text-anchor="middle">管理 / 对话入口</text>
  <text class="small" x="290" y="340" text-anchor="middle">JWT + Cookie 鉴权</text>
  <rect class="channel" x="780" y="255" width="240" height="65" rx="8" />
  <text class="box-title" x="900" y="284" text-anchor="middle">Gateway (:8081)</text>
  <text class="box-sub" x="900" y="304" text-anchor="middle">AI 调用统一治理</text>
  <text class="small" x="900" y="340" text-anchor="middle">Bearer sk-xxx 鉴权</text>

  <rect class="layer" x="40" y="420" width="1120" height="250" rx="8" />
  <text class="label" x="55" y="440" fill="#a371f7">Core - Agent Runtime 引擎层</text>
  <g>
    <rect class="core" x="70" y="455" width="240" height="60" rx="8" />
    <text class="box-title" x="190" y="482" text-anchor="middle">Agent</text>
    <text class="box-sub" x="190" y="501" text-anchor="middle">ReAct 循环编排</text>
    <rect class="core" x="330" y="455" width="240" height="60" rx="8" />
    <text class="box-title" x="450" y="482" text-anchor="middle">Skill</text>
    <text class="box-sub" x="450" y="501" text-anchor="middle">市场 + 执行</text>
    <rect class="core" x="590" y="455" width="240" height="60" rx="8" />
    <text class="box-title" x="710" y="482" text-anchor="middle">MCP Client</text>
    <text class="box-sub" x="710" y="501" text-anchor="middle">外部工具协议</text>
    <rect class="core" x="850" y="455" width="270" height="60" rx="8" />
    <text class="box-title" x="985" y="482" text-anchor="middle">Memory</text>
    <text class="box-sub" x="985" y="501" text-anchor="middle">短期 + 长期 + RAG</text>
    <rect class="core" x="70" y="545" width="240" height="60" rx="8" />
    <text class="box-title" x="190" y="572" text-anchor="middle">Model</text>
    <text class="box-sub" x="190" y="591" text-anchor="middle">多供应商管理</text>
    <rect class="core" x="330" y="545" width="240" height="60" rx="8" />
    <text class="box-title" x="450" y="572" text-anchor="middle">Profile</text>
    <text class="box-sub" x="450" y="591" text-anchor="middle">提示词分层注入</text>
    <rect class="core" x="590" y="545" width="240" height="60" rx="8" />
    <text class="box-title" x="710" y="572" text-anchor="middle">Context</text>
    <text class="box-sub" x="710" y="591" text-anchor="middle">Token 预算 + 裁剪</text>
    <rect class="core" x="850" y="545" width="270" height="60" rx="8" />
    <text class="box-title" x="985" y="572" text-anchor="middle">Team</text>
    <text class="box-sub" x="985" y="591" text-anchor="middle">Planner / Executor / Reviewer</text>
  </g>

  <rect class="layer" x="40" y="710" width="1120" height="130" rx="8" />
  <text class="label" x="55" y="730" fill="#d29922">基础设施</text>
  <g>
    <path class="infra" d="M100 760 C100 740,300 740,300 760 L300 805 C300 825,100 825,100 805 Z" />
    <ellipse class="infra" cx="200" cy="760" rx="100" ry="15" />
    <text class="box-title" x="200" y="782" text-anchor="middle">PostgreSQL</text>
    <text class="box-sub" x="200" y="802" text-anchor="middle">平台主数据库</text>
    <path class="infra" d="M450 760 C450 740,650 740,650 760 L650 805 C650 825,450 825,450 805 Z" />
    <ellipse class="infra" cx="550" cy="760" rx="100" ry="15" />
    <text class="box-title" x="550" y="782" text-anchor="middle">Qdrant</text>
    <text class="box-sub" x="550" y="802" text-anchor="middle">向量数据库</text>
    <rect class="infra" x="800" y="745" width="240" height="75" rx="8" />
    <text class="box-title" x="920" y="779" text-anchor="middle">LLM APIs</text>
    <text class="box-sub" x="920" y="800" text-anchor="middle">多模型供应商</text>
  </g>

  <path class="edge-blue" d="M290 155 V255" />
  <text class="small" x="306" y="207">JWT + Cookie</text>
  <path class="edge-blue" d="M900 155 V255" />
  <text class="small" x="916" y="207">Bearer sk-xxx</text>
  <path class="edge-green" d="M400 288 H780" />
  <text class="small" x="590" y="278" text-anchor="middle">内部转发</text>
  <path class="edge-purple" d="M235 320 V410 H190 V455" />
  <text class="small" x="143" y="392">管理配置查询</text>
  <path class="edge-purple" d="M960 320 V405 H190 V455" />
  <text class="small" x="675" y="393">AI 执行请求</text>
  <path class="edge-dashed" d="M190 515 V545" />
  <path class="edge-gold" d="M190 605 V745" />
  <path class="edge-gold" d="M985 515 V700 H550 V745" />
  <path class="edge-gold" d="M190 605 V700 H920 V745" />

  <rect class="layer" x="40" y="860" width="1120" height="70" rx="8" />
  <text class="small" x="55" y="880" font-weight="700">图例</text>
  <rect class="entry" x="55" y="890" width="20" height="14" rx="3" />
  <text class="small" x="82" y="902">入口</text>
  <rect class="channel" x="130" y="890" width="20" height="14" rx="3" />
  <text class="small" x="157" y="902">通道</text>
  <rect class="core" x="205" y="890" width="20" height="14" rx="3" />
  <text class="small" x="232" y="902">引擎</text>
  <rect class="infra" x="280" y="890" width="20" height="14" rx="3" />
  <text class="small" x="307" y="902">基础设施</text>
  <text class="small" x="420" y="902">实线 = 同步调用</text>
  <text class="small" x="540" y="902">虚线 = 模块间协作</text>
  <text class="small" x="670" y="902">圆柱 = 数据库</text>
</svg>
