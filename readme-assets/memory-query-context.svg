<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">记忆系统 - 查询检索与上下文注入统一流程</title>
  <desc id="desc">展示用户输入进入 ContextBuilder 后，Memory 与 RAG 并行召回并通过 Slot 注入 AgentContextDTO。</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/></marker><marker id="g" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/></marker><marker id="p" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#a78bfa"/></marker><style>.bg{fill:#0d1117}.panel{fill:#161b22;stroke:#30363d}.title{font:700 24px "Microsoft YaHei","Segoe UI",sans-serif;fill:#e6edf3}.lane{font:700 12px "Microsoft YaHei","Segoe UI",sans-serif}.t{font:700 12px "Microsoft YaHei","Segoe UI",sans-serif;fill:#f8fafc}.s{font:10px "Microsoft YaHei","Segoe UI",sans-serif;fill:#94a3b8}.box{rx:8;stroke-width:1.3}.entry{fill:#2a1905;stroke:#f59e0b}.mem{fill:#08243d;stroke:#38bdf8}.rag{fill:#062d1b;stroke:#22c55e}.ctx{fill:#31210a;stroke:#eab308}.guard{fill:#241142;stroke:#a78bfa;stroke-dasharray:5 5}.edge{fill:none;stroke:#38bdf8;stroke-width:2;marker-end:url(#a)}.good{fill:none;stroke:#22c55e;stroke-width:2;marker-end:url(#g)}.purple{fill:none;stroke:#a78bfa;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#p)}</style></defs>
  <rect class="bg" width="1500" height="900"/><text class="title" x="750" y="38" text-anchor="middle">记忆系统 - 查询检索与上下文注入统一流程</text>
  <rect class="panel" x="50" y="70" width="1400" height="150" rx="10"/><text class="lane" x="70" y="94" fill="#f59e0b">入口与查询准备</text>
  <g><ellipse class="entry" cx="130" cy="145" rx="70" ry="34"/><text class="t" x="130" y="150" text-anchor="middle">用户输入</text><rect class="box entry" x="245" y="112" width="185" height="66"/><text class="t" x="337" y="137" text-anchor="middle">Gateway</text><text class="s" x="337" y="154" text-anchor="middle">鉴权 / Trace / Token / 脱敏</text><rect class="box entry" x="485" y="112" width="170" height="66"/><text class="t" x="570" y="150" text-anchor="middle">Core Runtime</text><rect class="box ctx" x="710" y="105" width="210" height="80"/><text class="t" x="815" y="135" text-anchor="middle">ContextBuilder</text><text class="s" x="815" y="153" text-anchor="middle">SchemaAssembler</text><rect class="box guard" x="980" y="100" width="230" height="90"/><text class="t" x="1095" y="129" text-anchor="middle">查询增强开关</text><text class="s" x="1095" y="147" text-anchor="middle">HyDE / MQE 默认关闭</text><text class="s" x="1095" y="163" text-anchor="middle">必须经评测后开启</text><rect class="box mem" x="1275" y="112" width="130" height="66"/><text class="t" x="1340" y="137" text-anchor="middle">Embedding</text><text class="s" x="1340" y="154" text-anchor="middle">query 只算一次</text></g>
  <path class="edge" d="M200 145 H245"/><path class="edge" d="M430 145 H485"/><path class="edge" d="M655 145 H710"/><path class="purple" d="M920 145 H980"/><path class="edge" d="M1210 145 H1275"/>
  <rect class="panel" x="50" y="270" width="670" height="350" rx="10"/><text class="lane" x="70" y="294" fill="#38bdf8">Memory 分支：用户长期状态</text>
  <g><rect class="box mem" x="85" y="325" width="190" height="60"/><text class="t" x="180" y="350" text-anchor="middle">Memory Strategy</text><text class="s" x="180" y="368" text-anchor="middle">DISABLED / READ_ONLY...</text><rect class="box mem" x="320" y="325" width="160" height="60"/><text class="t" x="400" y="350" text-anchor="middle">向量召回</text><text class="s" x="400" y="368" text-anchor="middle">Qdrant source=memory</text><rect class="box mem" x="525" y="325" width="160" height="60"/><text class="t" x="605" y="350" text-anchor="middle">倒排召回</text><text class="s" x="605" y="368" text-anchor="middle">PG tsvector</text><rect class="box guard" x="145" y="435" width="200" height="62"/><text class="t" x="245" y="459" text-anchor="middle">图谱召回</text><text class="s" x="245" y="477" text-anchor="middle">Neo4j 后续增强</text><rect class="box ctx" x="410" y="430" width="220" height="72"/><text class="t" x="520" y="456" text-anchor="middle">Memory RRF 融合</text><text class="s" x="520" y="474" text-anchor="middle">keyword hit + importance</text><rect class="box ctx" x="245" y="540" width="250" height="54"/><text class="t" x="370" y="563" text-anchor="middle">TASK_MEMORY Slot</text><text class="s" x="370" y="581" text-anchor="middle">不作为 citation 来源</text></g>
  <path class="edge" d="M275 355 H320"/><path class="edge" d="M480 355 H525"/><path class="purple" d="M245 435 V405 H400"/><path class="edge" d="M400 385 V430"/><path class="edge" d="M605 385 V430 H630"/><path class="edge" d="M520 502 V540"/>
  <rect class="panel" x="780" y="270" width="670" height="350" rx="10"/><text class="lane" x="800" y="294" fill="#22c55e">RAG 分支：外部知识依据</text>
  <g><rect class="box rag" x="815" y="325" width="190" height="60"/><text class="t" x="910" y="350" text-anchor="middle">Scope Filter</text><text class="s" x="910" y="368" text-anchor="middle">tenant / app / profile</text><rect class="box rag" x="1050" y="325" width="160" height="60"/><text class="t" x="1130" y="350" text-anchor="middle">向量召回</text><text class="s" x="1130" y="368" text-anchor="middle">Qdrant source=rag</text><rect class="box rag" x="1255" y="325" width="160" height="60"/><text class="t" x="1335" y="350" text-anchor="middle">倒排召回</text><text class="s" x="1335" y="368" text-anchor="middle">PG tsvector</text><rect class="box guard" x="875" y="435" width="200" height="62"/><text class="t" x="975" y="459" text-anchor="middle">图谱召回</text><text class="s" x="975" y="477" text-anchor="middle">文档实体关系</text><rect class="box ctx" x="1140" y="430" width="220" height="72"/><text class="t" x="1250" y="456" text-anchor="middle">RAG RRF 融合</text><text class="s" x="1250" y="474" text-anchor="middle">向量 / 倒排 / 扩展查询</text><rect class="box ctx" x="975" y="540" width="250" height="54"/><text class="t" x="1100" y="563" text-anchor="middle">RAG_RECALL Slot</text><text class="s" x="1100" y="581" text-anchor="middle">可作为 citation 来源</text></g>
  <path class="good" d="M1005 355 H1050"/><path class="good" d="M1210 355 H1255"/><path class="purple" d="M975 435 V405 H1130"/><path class="good" d="M1130 385 V430"/><path class="good" d="M1335 385 V430 H1360"/><path class="good" d="M1250 502 V540"/>
  <path class="purple" d="M1340 178 V245 H385 V325"/><text class="s" x="540" y="238">memoryFuture</text><path class="purple" d="M1340 178 V245 H1115 V325"/><text class="s" x="1200" y="238">ragFuture</text>
  <rect class="panel" x="270" y="685" width="960" height="140" rx="10"/><text class="lane" x="290" y="710" fill="#eab308">Context 汇合与最终注入</text>
  <rect class="box ctx" x="335" y="740" width="230" height="55"/><text class="t" x="450" y="763" text-anchor="middle">ContextBudgetPolicy</text><text class="s" x="450" y="781" text-anchor="middle">每个 Slot 独立预算</text><rect class="box ctx" x="635" y="740" width="230" height="55"/><text class="t" x="750" y="763" text-anchor="middle">Trace Span</text><text class="s" x="750" y="781" text-anchor="middle">只存 count/status，不存原文</text><rect class="box rag" x="935" y="740" width="230" height="55"/><text class="t" x="1050" y="763" text-anchor="middle">AgentContextDTO</text><text class="s" x="1050" y="781" text-anchor="middle">System Prompt + apiMessages</text>
  <path class="edge" d="M370 594 V660 H450 V740"/><path class="good" d="M1100 594 V660 H1050 V740"/><path class="edge" d="M565 768 H635"/><path class="good" d="M865 768 H935"/>
</svg>
