<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">单 Agent 核心流程图</title>
  <desc id="desc">展示 run 外层编排、runModelLoop 循环、工具执行分支和右侧代码事实备注。</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#58a6ff"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/></marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#fb7185"/></marker>
    <style>
      .bg{fill:#0d1117}.panel{fill:#161b22;stroke:#30363d;stroke-width:1.2}.title{font:700 24px "Microsoft YaHei","Segoe UI",sans-serif;fill:#e6edf3}.lane{font:700 12px "Microsoft YaHei","Segoe UI",sans-serif}.t{font:700 12px "Microsoft YaHei","Segoe UI",sans-serif;fill:#f8fafc}.s{font:10px "Microsoft YaHei","Segoe UI",sans-serif;fill:#94a3b8}.b{rx:8;stroke-width:1.3}.ok{fill:#052e16;stroke:#22c55e}.warn{fill:#3a2605;stroke:#f59e0b}.off{fill:#241142;stroke:#a855f7;stroke-dasharray:5 5}.note{fill:#101826;stroke:#64748b}.edge{fill:none;stroke:#58a6ff;stroke-width:2;marker-end:url(#arrow-blue)}.good{fill:none;stroke:#22c55e;stroke-width:2;marker-end:url(#arrow-green)}.bad{fill:none;stroke:#fb7185;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#arrow-red)}.amber{fill:none;stroke:#f59e0b;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#arrow-amber)}
    </style>
  </defs>
  <rect class="bg" width="1500" height="980"/>
  <text class="title" x="750" y="36" text-anchor="middle">单 Agent 核心流程图（run 外层编排 + runModelLoop 简版）</text>

  <rect class="panel" x="40" y="65" width="1420" height="150" rx="10"/>
  <text class="lane" x="60" y="88" fill="#58a6ff">一、run() 外层：进入 runModelLoop 前后</text>
  <g>
    <rect class="b ok" x="65" y="120" width="110" height="44"/><text class="t" x="120" y="147" text-anchor="middle">run()</text>
    <rect class="b ok" x="210" y="120" width="130" height="44"/><text class="t" x="275" y="139" text-anchor="middle">validate</text><text class="s" x="275" y="154" text-anchor="middle">start span</text>
    <rect class="b ok" x="375" y="120" width="150" height="44"/><text class="t" x="450" y="147" text-anchor="middle">ensureConversation</text>
    <rect class="b ok" x="560" y="120" width="130" height="44"/><text class="t" x="625" y="147" text-anchor="middle">buildContext</text>
    <path class="off" d="M735 120 L790 142 L735 164 L680 142 Z"/><text class="t" x="735" y="146" text-anchor="middle">TEAM?</text>
    <rect class="b ok" x="835" y="120" width="120" height="44"/><text class="t" x="895" y="147" text-anchor="middle">save user</text>
    <rect class="b ok" x="990" y="120" width="145" height="44"/><text class="t" x="1062" y="147" text-anchor="middle">runModelLoop</text>
    <rect class="b ok" x="1170" y="120" width="150" height="44"/><text class="t" x="1245" y="147" text-anchor="middle">buildFinalAnswer</text>
    <rect class="b ok" x="1355" y="112" width="90" height="60"/><text class="t" x="1400" y="137" text-anchor="middle">save</text><text class="s" x="1400" y="154" text-anchor="middle">assistant</text>
    <path class="edge" d="M175 142 H210"/><path class="edge" d="M340 142 H375"/><path class="edge" d="M525 142 H560"/><path class="edge" d="M690 142 H680"/><path class="edge" d="M790 142 H835"/><path class="edge" d="M955 142 H990"/><path class="edge" d="M1135 142 H1170"/><path class="edge" d="M1320 142 H1355"/>
    <path class="amber" d="M735 164 V195 H1030"/><text class="s" x="770" y="193">team 分支转 TeamRuntime，不属于单 Agent 主链路</text>
  </g>

  <rect class="panel" x="330" y="250" width="760" height="680" rx="10"/>
  <text class="lane" x="350" y="274" fill="#c084fc">二、runModelLoop() 主流程</text>
  <g>
    <rect class="b ok" x="560" y="305" width="300" height="48"/><text class="t" x="710" y="326" text-anchor="middle">入口</text><text class="s" x="710" y="342" text-anchor="middle">messages + availableTools</text>
    <path class="ok" d="M600 385 L710 430 L820 385 L710 340 Z" transform="translate(0,40)"/><text class="t" x="710" y="430" text-anchor="middle">pendingToolCall?</text>
    <rect class="b warn" x="380" y="410" width="230" height="62"/><text class="t" x="495" y="433" text-anchor="middle">未确认高危工具</text><text class="s" x="495" y="451" text-anchor="middle">注入 confirm required 后返回</text>
    <rect class="b ok" x="825" y="415" width="190" height="52"/><text class="t" x="920" y="437" text-anchor="middle">已确认 / 无 pending</text><text class="s" x="920" y="453" text-anchor="middle">进入循环</text>
    <rect class="b ok" x="540" y="515" width="340" height="54"/><text class="t" x="710" y="536" text-anchor="middle">ReAct step &lt; 6</text><text class="s" x="710" y="553" text-anchor="middle">最多 6 轮模型 / 8 次工具</text>
    <rect class="b ok" x="570" y="610" width="280" height="46"/><text class="t" x="710" y="638" text-anchor="middle">compactMessages()</text>
    <rect class="b ok" x="555" y="700" width="310" height="46"/><text class="t" x="710" y="728" text-anchor="middle">invokeModel() 调用 LLM</text>
    <path class="ok" d="M595 790 L710 835 L825 790 L710 745 Z"/><text class="t" x="710" y="793" text-anchor="middle">模型调用工具?</text>
    <rect class="b ok" x="855" y="770" width="205" height="62"/><text class="t" x="958" y="793" text-anchor="middle">否</text><text class="s" x="958" y="811" text-anchor="middle">尝试天气 repair，否则返回答案</text>
    <rect class="b warn" x="375" y="770" width="220" height="62"/><text class="t" x="485" y="793" text-anchor="middle">异常 / 耗尽</text><text class="s" x="485" y="811" text-anchor="middle">fallbackDirectAnswer()</text>
    <path class="ok" d="M600 875 L710 920 L820 875 L710 830 Z"/><text class="t" x="710" y="879" text-anchor="middle">工具存在且参数合法?</text>
    <rect class="b warn" x="375" y="865" width="220" height="60"/><text class="t" x="485" y="888" text-anchor="middle">否</text><text class="s" x="485" y="906" text-anchor="middle">注入 unavailable / invalid args</text>
  </g>
  <path class="edge" d="M710 353 V395"/><path class="bad" d="M600 435 H610"/><path class="good" d="M820 435 H825"/><path class="edge" d="M920 467 V492 H710 V515"/><path class="edge" d="M710 569 V610"/><path class="edge" d="M710 656 V700"/><path class="edge" d="M710 746 V745"/><path class="good" d="M825 790 H855"/><path class="amber" d="M595 790 H375"/><path class="edge" d="M710 835 V830"/><path class="amber" d="M600 875 H595"/><path class="good" d="M710 920 V945 H1065 V542 H880"/><text class="s" x="1015" y="755">工具成功后 continue 到下一轮</text>

  <rect class="panel" x="1120" y="250" width="340" height="590" rx="10"/>
  <text class="lane" x="1140" y="274" fill="#94a3b8">三、右侧代码事实</text>
  <g>
    <rect class="b note" x="1145" y="315" width="290" height="78"/><text class="t" x="1290" y="338" text-anchor="middle">ContextBuilder</text><text class="s" x="1290" y="356" text-anchor="middle">Profile / Skill / MCP / Memory</text><text class="s" x="1290" y="372" text-anchor="middle">Experience / RAG / History / Budget</text>
    <rect class="b note" x="1145" y="425" width="290" height="78"/><text class="t" x="1290" y="448" text-anchor="middle">ModelInvoke</text><text class="s" x="1290" y="466" text-anchor="middle">按 modelConfigId 选择 provider</text><text class="s" x="1290" y="482" text-anchor="middle">返回 message / usage / toolCalls</text>
    <rect class="b note" x="1145" y="535" width="290" height="88"/><text class="t" x="1290" y="558" text-anchor="middle">Tool 执行</text><text class="s" x="1290" y="576" text-anchor="middle">Planner 判断串行/并行</text><text class="s" x="1290" y="592" text-anchor="middle">Dispatcher 分流 Skill / MCP</text><text class="s" x="1290" y="608" text-anchor="middle">并行仅限低风险只读工具</text>
    <rect class="b note" x="1145" y="655" width="290" height="88"/><text class="t" x="1290" y="678" text-anchor="middle">Trace / Token / Hook</text><text class="s" x="1290" y="696" text-anchor="middle">记录 span 和 usage</text><text class="s" x="1290" y="712" text-anchor="middle">观测能力，不控制主流程</text>
    <rect class="b off" x="1145" y="775" width="290" height="48"/><text class="t" x="1290" y="796" text-anchor="middle">Memory 写入</text><text class="s" x="1290" y="812" text-anchor="middle">仅 READ_WRITE 策略写长期记忆</text>
  </g>

  <rect class="panel" x="40" y="865" width="250" height="65" rx="10"/>
  <rect class="b ok" x="60" y="890" width="70" height="26"/><text class="s" x="95" y="907" text-anchor="middle">已实现</text>
  <rect class="b warn" x="145" y="890" width="70" height="26"/><text class="s" x="180" y="907" text-anchor="middle">异常/降级</text>
  <rect class="b off" x="230" y="890" width="40" height="26"/><text class="s" x="250" y="907" text-anchor="middle">旁路</text>
</svg>
