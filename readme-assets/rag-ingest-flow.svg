<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="850" viewBox="0 0 1500 850" role="img" aria-labelledby="title desc">
  <title id="title">RAG 知识库入库流程</title>
  <desc id="desc">展示知识文档上传、去重、切块、embedding、PG 与 Qdrant 索引写入以及失败降级。</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/></marker><style>.bg{fill:#0d1117}.panel{fill:#161b22;stroke:#30363d}.title{font:700 24px "Microsoft YaHei","Segoe UI",sans-serif;fill:#e6edf3}.lane{font:700 12px "Microsoft YaHei","Segoe UI",sans-serif}.t{font:700 12px "Microsoft YaHei","Segoe UI",sans-serif;fill:#f8fafc}.s{font:10px "Microsoft YaHei","Segoe UI",sans-serif;fill:#94a3b8}.box{rx:8;stroke-width:1.3}.rag{fill:#062d1b;stroke:#22c55e}.store{fill:#111827;stroke:#64748b}.warn{fill:#3a2605;stroke:#f59e0b}.off{fill:#241142;stroke:#a78bfa;stroke-dasharray:5 5}.edge{fill:none;stroke:#22c55e;stroke-width:2;marker-end:url(#a)}.dash{fill:none;stroke:#a78bfa;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#a)}</style></defs>
  <rect class="bg" width="1500" height="850"/><text class="title" x="750" y="38" text-anchor="middle">RAG 知识库入库流程（用户主动上传）</text>
  <rect class="panel" x="80" y="75" width="1340" height="430" rx="10"/><text class="lane" x="100" y="100" fill="#22c55e">主链路</text>
  <ellipse class="rag" cx="750" cy="145" rx="250" ry="34"/><text class="t" x="750" y="150" text-anchor="middle">用户上传文档（POST /api/rag/documents）</text>
  <rect class="box store" x="430" y="220" width="640" height="52"/><text class="t" x="750" y="241" text-anchor="middle">写入 knowledge_documents</text><text class="s" x="750" y="259" text-anchor="middle">title + content + SHA256 hash 去重</text>
  <rect class="box store" x="430" y="315" width="640" height="52"/><text class="t" x="750" y="336" text-anchor="middle">TextSplitter 文本切分</text><text class="s" x="750" y="354" text-anchor="middle">chunkTokenBudget + overlapTokens</text>
  <rect class="box store" x="430" y="410" width="640" height="52"/><text class="t" x="750" y="431" text-anchor="middle">批量写入 knowledge_chunks</text><text class="s" x="750" y="449" text-anchor="middle">content + chunkIndex + tokenCount</text>
  <path class="edge" d="M750 179 V220"/><path class="edge" d="M750 272 V315"/><path class="edge" d="M750 367 V410"/>

  <rect class="panel" x="80" y="545" width="1340" height="125" rx="10"/><text class="lane" x="100" y="570" fill="#94a3b8">索引写入：PG + 可选 Qdrant，Neo4j 后续增强</text>
  <rect class="box rag" x="125" y="595" width="310" height="52"/><text class="t" x="280" y="616" text-anchor="middle">向量索引</text><text class="s" x="280" y="634" text-anchor="middle">Embedding(chunk) -&gt; upsert Qdrant</text>
  <rect class="box off" x="595" y="595" width="310" height="52"/><text class="t" x="750" y="616" text-anchor="middle">知识图谱</text><text class="s" x="750" y="634" text-anchor="middle">LLM 实体关系 -&gt; Neo4j（未实现）</text>
  <rect class="box rag" x="1065" y="595" width="310" height="52"/><text class="t" x="1220" y="616" text-anchor="middle">倒排索引</text><text class="s" x="1220" y="634" text-anchor="middle">PG trigger 更新 tsvector + GIN</text>
  <path class="edge" d="M610 462 V520 H280 V595"/><path class="dash" d="M750 462 V595"/><path class="edge" d="M890 462 V520 H1220 V595"/>

  <rect class="box rag" x="360" y="720" width="780" height="48"/><text class="t" x="750" y="740" text-anchor="middle">索引完成 -&gt; 文档状态 INDEXED</text><text class="s" x="750" y="758" text-anchor="middle">下一轮对话通过 RAG_RECALL Slot 召回，可作为 citation 来源</text>
  <path class="edge" d="M280 647 V690 H750 V720"/><path class="dash" d="M750 647 V720"/><path class="edge" d="M1220 647 V690 H750"/>

  <rect class="panel" x="80" y="700" width="220" height="95" rx="10"/><text class="lane" x="100" y="724" fill="#f59e0b">容错降级</text><text class="s" x="105" y="750">Embedding/Qdrant 失败时</text><text class="s" x="105" y="768">跳过向量索引，PG keyword 兜底</text>
</svg>
